<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PlugMyTag Local</title>
<style>
  :root {
    --bg: #0a0a12;
    --bg-2: #11111d;
    --panel: #151524;
    --panel-2: #1b1b2d;
    --line: #262640;
    --line-2: #33334d;
    --text: #ececf6;
    --muted: #8f90ad;
    --muted-2: #5e5f78;
    --accent: #ff3d6e;
    --accent-2: #7c5cff;
    --accent-3: #31d0aa;
    --danger: #ff7a8a;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1000px 550px at 15% -10%, rgba(124,92,255,0.22) 0%, transparent 55%),
      radial-gradient(900px 500px at 95% 110%, rgba(255,61,110,0.18) 0%, transparent 55%),
      var(--bg);
    color: var(--text);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; justify-content: center;
    padding: 40px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .app { width: 100%; max-width: 760px; }

  /* Header */
  .head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: conic-gradient(from 200deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
    position: relative;
  }
  .logo::after {
    content: ""; position: absolute; inset: 5px; border-radius: 7px;
    background: var(--bg);
  }
  .logo::before {
    content: "▶"; position: absolute; inset: 0; display: grid; place-items: center;
    color: var(--text); font-size: 12px; z-index: 1;
  }
  h1 {
    font-size: 26px; margin: 0; letter-spacing: -0.01em; font-weight: 700;
    background: linear-gradient(90deg, #fff, #b6aaff 60%, var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 13px; margin: 4px 0 24px 48px; }

  /* Panels */
  .panel {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 30px rgba(0,0,0,0.25);
  }
  .panel h2 {
    margin: 0 0 12px; font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Preset strip */
  .presets {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: thin; scrollbar-color: var(--line-2) transparent;
  }
  .presets::-webkit-scrollbar { height: 6px; }
  .presets::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  .preset {
    flex: 0 0 auto; padding: 9px 14px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap;
    transition: transform 0.08s ease, border-color 0.15s, background 0.15s;
  }
  .preset:hover { border-color: var(--accent-2); }
  .preset.active {
    background: linear-gradient(90deg, rgba(255,61,110,0.2), rgba(124,92,255,0.2));
    border-color: var(--accent);
  }
  .preset .ico { margin-right: 6px; }

  /* Inputs */
  label.field { display: block; font-size: 11px; color: var(--muted);
                text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  input[type=text], select {
    width: 100%; background: #0c0c16; color: var(--text);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; font-size: 15px; outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent-2); }

  .row { display: grid; gap: 12px; }
  .row.two { grid-template-columns: 1fr 1fr; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }

  /* Effects grid */
  .fx {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .fx-item {
    display: flex; align-items: center; gap: 10px;
    background: #0d0d18; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; cursor: pointer;
    user-select: none; font-size: 14px; transition: border-color 0.15s, background 0.15s;
  }
  .fx-item:hover { border-color: var(--line-2); }
  .fx-item input { accent-color: var(--accent); }
  .fx-item.on { border-color: var(--accent); background: rgba(255,61,110,0.06); }
  .fx-item .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted-2); transition: background 0.15s, box-shadow 0.15s;
  }
  .fx-item.on .dot { background: var(--accent);
                     box-shadow: 0 0 8px var(--accent); }

  /* Sliders */
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--accent-2); }
  .slider-row .val { color: var(--muted); min-width: 44px; text-align: right;
                     font-variant-numeric: tabular-nums; font-size: 12px; }

  /* Generate button */
  .go-wrap { position: relative; }
  button.primary {
    width: 100%; padding: 15px 18px; border: 0; border-radius: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: white; font-weight: 600; font-size: 15px; cursor: pointer;
    letter-spacing: 0.02em; transition: transform 0.06s ease, filter 0.15s;
    box-shadow: 0 8px 22px rgba(124,92,255,0.25);
  }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: 0.7; cursor: progress; }
  button.primary.loading { background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
                           background-size: 400% 100%; animation: flow 2s linear infinite; }
  @keyframes flow { 0% { background-position: 0% 0; } 100% { background-position: 400% 0; } }

  .output { display: none; }
  .output.show { display: block; }
  audio { width: 100%; margin: 4px 0 12px; filter: invert(0.92) hue-rotate(180deg); border-radius: 8px; }
  .out-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .dl {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 14px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    text-decoration: none; font-size: 13px; font-weight: 500;
    transition: border-color 0.15s;
  }
  .dl:hover { border-color: var(--accent-2); }
  .dl.primary-dl { background: linear-gradient(90deg, rgba(255,61,110,0.18), rgba(124,92,255,0.18));
                   border-color: var(--accent); }
  .err { color: var(--danger); font-size: 13px; margin-top: 10px;
         background: rgba(255,122,138,0.08); border: 1px solid rgba(255,122,138,0.25);
         padding: 10px 12px; border-radius: 8px; display: none; }
  .err.show { display: block; }
  .hint { color: var(--muted); font-size: 12px; }

  .footer { text-align: center; color: var(--muted-2); font-size: 12px; margin-top: 28px; }
  .footer a { color: var(--muted); text-decoration: none; }
  .footer a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div class="logo"></div>
    <h1>PlugMyTag — Local</h1>
  </div>
  <div class="sub">Free producer-tag generator. macOS <code>say</code> + ffmpeg. No API keys.</div>

  <div class="panel">
    <h2>Presets</h2>
    <div class="presets" id="presets"></div>
  </div>

  <div class="panel">
    <h2>Your Tag</h2>
    <div class="row">
      <div>
        <label class="field" for="text">Tag text</label>
        <input id="text" type="text" placeholder="Prod by YourName" value="Prod by Austn" />
      </div>
      <div class="row two">
        <div>
          <label class="field" for="voice">Voice</label>
          <select id="voice"></select>
        </div>
        <div>
          <label class="field" for="format">Format</label>
          <select id="format">
            <option value="wav">WAV (lossless)</option>
            <option value="mp3">MP3</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>Effects</h2>
    <div class="fx" id="fxGrid"></div>
    <div style="margin-top:14px" class="row three">
      <div>
        <label class="field">Pitch (semi)</label>
        <div class="slider-row">
          <input id="pitch" type="range" min="-12" max="12" step="1" value="0" />
          <span class="val" id="pitchVal">0</span>
        </div>
      </div>
      <div>
        <label class="field">Rate</label>
        <div class="slider-row">
          <input id="rate" type="range" min="0.5" max="1.5" step="0.05" value="1" />
          <span class="val" id="rateVal">1.00</span>
        </div>
      </div>
      <div>
        <label class="field">Reverb wet</label>
        <div class="slider-row">
          <input id="reverbAmount" type="range" min="0" max="1" step="0.05" value="0.5" />
          <span class="val" id="reverbAmountVal">0.50</span>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="go-wrap">
      <button id="go" class="primary">Generate Tag ↵</button>
    </div>
    <div id="err" class="err"></div>
    <div id="output" class="output" style="margin-top:14px">
      <audio id="player" controls></audio>
      <div class="out-meta">
        <a id="download" class="dl primary-dl" download>↓ Download</a>
        <span class="hint" id="stamp"></span>
      </div>
    </div>
  </div>

  <div class="footer">
    Press <kbd>Enter</kbd> in the text box to generate ·
    <a href="https://github.com/AUstnnnnnn/plugmytag-local" target="_blank">github</a>
  </div>
</div>

<script>
/* ---------- Presets ---------- */
const PRESETS = [
  { id: "classic", icon: "🎙️", name: "Classic Tag",
    fx: { voice: "Alex", pitch: -1, rate: 1.0, reverbAmount: 0.4,
          reverb: true, compression: true } },
  { id: "trap", icon: "🔥", name: "Trap God",
    fx: { voice: "Fred", pitch: -4, rate: 0.95, reverbAmount: 0.6,
          reverb: true, distortion: true, distortionAmount: 0.35,
          compression: true, bass: true } },
  { id: "demon", icon: "😈", name: "Demon",
    fx: { voice: "Fred", pitch: -7, rate: 0.9, reverbAmount: 0.75,
          reverb: true, distortion: true, distortionAmount: 0.5,
          bass: true, compression: true } },
  { id: "chipmunk", icon: "🐿️", name: "Chipmunk",
    fx: { voice: "Samantha", pitch: 7, rate: 1.1, reverbAmount: 0.2,
          compression: true } },
  { id: "radio", icon: "📻", name: "Radio DJ",
    fx: { voice: "Victoria", pitch: 0, rate: 1.0, reverbAmount: 0.25,
          reverb: true, compression: true, highpass: true } },
  { id: "phone", icon: "☎️", name: "Telephone",
    fx: { voice: "Daniel", pitch: 0, rate: 1.0, reverbAmount: 0,
          highpass: true, lowpass: true, distortion: true, distortionAmount: 0.25 } },
  { id: "cinematic", icon: "🎬", name: "Cinematic",
    fx: { voice: "Daniel", pitch: -2, rate: 0.95, reverbAmount: 0.85,
          reverb: true, delay: true, bass: true, compression: true } },
  { id: "stadium", icon: "📢", name: "Stadium",
    fx: { voice: "Ralph", pitch: -1, rate: 1.0, reverbAmount: 0.9,
          reverb: true, delay: true, bass: true } },
  { id: "underwater", icon: "🌊", name: "Underwater",
    fx: { voice: "Fiona", pitch: -2, rate: 0.95, reverbAmount: 0.8,
          reverb: true, lowpass: true } },
  { id: "vinyl", icon: "💿", name: "Dusty Vinyl",
    fx: { voice: "Alex", pitch: -1, rate: 0.98, reverbAmount: 0.3,
          reverb: true, distortion: true, distortionAmount: 0.2,
          lowpass: true, compression: true } },
  { id: "dry", icon: "🧼", name: "Dry & Clean",
    fx: { voice: "Samantha", pitch: 0, rate: 1.0, reverbAmount: 0,
          compression: true } },
];

const FX_DEFS = [
  { key: "reverb",     label: "Reverb" },
  { key: "delay",      label: "Delay" },
  { key: "distortion", label: "Distortion" },
  { key: "compression",label: "Compression" },
  { key: "lowpass",    label: "Low-pass" },
  { key: "highpass",   label: "High-pass" },
  { key: "bass",       label: "Bass boost" },
];

/* ---------- DOM setup ---------- */
const presetsEl = document.getElementById("presets");
const fxGrid = document.getElementById("fxGrid");
const pitchEl = document.getElementById("pitch");
const rateEl = document.getElementById("rate");
const reverbAmt = document.getElementById("reverbAmount");

for (const p of PRESETS) {
  const b = document.createElement("button");
  b.className = "preset";
  b.dataset.preset = p.id;
  b.innerHTML = `<span class="ico">${p.icon}</span>${p.name}`;
  b.onclick = () => applyPreset(p);
  presetsEl.appendChild(b);
}

for (const f of FX_DEFS) {
  const el = document.createElement("label");
  el.className = "fx-item";
  el.dataset.fx = f.key;
  el.innerHTML = `<span class="dot"></span>
                  <input type="checkbox" data-fx="${f.key}" style="display:none"/>
                  <span>${f.label}</span>`;
  const cb = el.querySelector("input");
  cb.addEventListener("change", () => el.classList.toggle("on", cb.checked));
  fxGrid.appendChild(el);
}

pitchEl.oninput = () => document.getElementById("pitchVal").textContent = pitchEl.value;
rateEl.oninput = () => document.getElementById("rateVal").textContent = parseFloat(rateEl.value).toFixed(2);
reverbAmt.oninput = () => document.getElementById("reverbAmountVal").textContent = parseFloat(reverbAmt.value).toFixed(2);

document.getElementById("text").addEventListener("keydown", (e) => {
  if (e.key === "Enter") generate();
});

function setFxValue(key, val) {
  const cb = fxGrid.querySelector(`input[data-fx="${key}"]`);
  if (cb) { cb.checked = !!val; cb.dispatchEvent(new Event("change")); }
}
function clearFx() {
  for (const cb of fxGrid.querySelectorAll("input[type=checkbox]")) {
    cb.checked = false; cb.dispatchEvent(new Event("change"));
  }
}

function applyPreset(p) {
  presetsEl.querySelectorAll(".preset").forEach(el =>
    el.classList.toggle("active", el.dataset.preset === p.id));
  clearFx();
  const f = p.fx;
  if (f.voice) {
    const sel = document.getElementById("voice");
    const match = [...sel.options].find(o => o.value === f.voice);
    if (match) sel.value = f.voice;
  }
  pitchEl.value = f.pitch ?? 0; pitchEl.oninput();
  rateEl.value = f.rate ?? 1; rateEl.oninput();
  reverbAmt.value = f.reverbAmount ?? 0.5; reverbAmt.oninput();
  for (const key of ["reverb","delay","distortion","compression","lowpass","highpass","bass"]) {
    setFxValue(key, f[key]);
  }
}

/* ---------- Voices ---------- */
async function loadVoices() {
  const sel = document.getElementById("voice");
  const res = await fetch("/voices");
  const voices = await res.json();
  const preferred = ["Alex", "Samantha", "Daniel", "Fred", "Victoria", "Ralph", "Fiona",
                     "Karen", "Moira", "Tessa"];
  voices.sort((a, b) => {
    const ia = preferred.indexOf(a.name);
    const ib = preferred.indexOf(b.name);
    if (ia !== -1 || ib !== -1) return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    return a.name.localeCompare(b.name);
  });
  for (const v of voices) {
    const o = document.createElement("option");
    o.value = v.name;
    o.textContent = `${v.name} (${v.locale})`;
    sel.appendChild(o);
  }
}

/* ---------- Generate ---------- */
async function generate() {
  const btn = document.getElementById("go");
  const err = document.getElementById("err");
  const out = document.getElementById("output");
  err.classList.remove("show"); err.textContent = "";

  const payload = {
    text: document.getElementById("text").value,
    voice: document.getElementById("voice").value,
    format: document.getElementById("format").value,
    effects: {
      pitch: parseFloat(pitchEl.value),
      rate: parseFloat(rateEl.value),
      reverbAmount: parseFloat(reverbAmt.value),
    },
  };
  for (const cb of fxGrid.querySelectorAll("input[type=checkbox]")) {
    payload.effects[cb.dataset.fx] = cb.checked;
  }

  btn.disabled = true;
  btn.classList.add("loading");
  btn.textContent = "Generating…";
  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({error: res.statusText}));
      throw new Error(j.error || "generation failed");
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = document.getElementById("player");
    audio.src = url;
    const dl = document.getElementById("download");
    dl.href = url;
    dl.download = `tag-${Date.now()}.${payload.format}`;
    document.getElementById("stamp").textContent =
      `${(blob.size/1024).toFixed(1)} KB · ${payload.format.toUpperCase()}`;
    out.classList.add("show");
    audio.play().catch(() => {});
  } catch (e) {
    err.textContent = e.message;
    err.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.textContent = "Generate Tag ↵";
  }
}

document.getElementById("go").addEventListener("click", generate);
loadVoices().then(() => applyPreset(PRESETS[0]));
</script>
</body>
</html>
